version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: adminplus-test-postgres
    environment:
      POSTGRES_DB: adminplus_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
