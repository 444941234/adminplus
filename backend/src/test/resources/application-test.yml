spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/adminplus_test
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: simple

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/

  cors:
    allowed-origins: http://localhost:5173

# Test environment JWT configuration
jwt:
  secret: test-jwt-secret-key-for-unit-testing-only
  dev-secret: test-dev-secret

# Disable virus scan for tests
virus:
  scan:
    enabled: false

logging:
  level:
    root: WARN
    com.adminplus: DEBUG
