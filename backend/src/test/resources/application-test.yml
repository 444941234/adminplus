spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Disable Redis for unit tests
  data:
    redis:
      repositories:
        enabled: false

  # Disable cache for tests
  cache:
    type: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/

  cors:
    allowed-origins: http://localhost:5173

# Test environment JWT configuration
jwt:
  secret: test-jwt-secret-key-for-unit-testing-only
  dev-secret: test-dev-secret

# Disable virus scan for tests
virus:
  scan:
    enabled: false

logging:
  level:
    root: WARN
    com.adminplus: DEBUG